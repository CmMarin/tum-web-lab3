backend:
  name: git-gateway
  branch: Lab4 # Branch to update (optional; defaults to master)

local_backend: true # Enable local backend for development

media_folder: "public/images/uploads" # Media files will be stored in the repo under public/images/uploads
public_folder: "/images/uploads" # The src attribute for uploaded media will begin with /images/uploads

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "src/content/home.json"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtitle", name: "hero_subtitle", widget: "string"}
          - {label: "CTA Text", name: "cta_text", widget: "string"}
          - {label: "CTA Link", name: "cta_link", widget: "string"}
          - {label: "About Title", name: "about_title", widget: "string"}
          - {label: "About Description", name: "about_description", widget: "text"}
          - {label: "Features Title", name: "features_title", widget: "string"}
          - label: "Features List"
            name: "features"
            widget: "list"
            fields:
              - {label: "Icon", name: "icon", widget: "string"}
              - {label: "Text", name: "text", widget: "string"}
          - {label: "Classes Title", name: "classes_title", widget: "string"}
          - label: "Classes List"
            name: "classes_list"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Mobile Icon (Emoji)", name: "mobile_icon", widget: "string"}
              - {label: "Stars (1-3)", name: "stars", widget: "number", value_type: "int", min: 1, max: 3}
              - {label: "Schedule", name: "schedule", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Price", name: "price", widget: "string"}
              - {label: "Is Featured (First Class Free)", name: "is_featured", widget: "boolean", default: false}
          - {label: "Testimonials Title", name: "testimonials_title", widget: "string"}
          - label: "Testimonials List"
            name: "testimonials_list"
            widget: "list"
            fields:
              - {label: "Author", name: "author", widget: "string"}
              - {label: "Text (Desktop)", name: "text", widget: "text"}
              - {label: "Text (Mobile Short)", name: "mobile_text", widget: "string"}
              - {label: "Rating (1-5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5}
